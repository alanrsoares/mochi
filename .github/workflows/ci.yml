name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      # The whole quality gate: biome + tsc --noEmit + formatter dogfood + the
      # test suite. The suite already enforces the two self-hosting north-stars —
      # the tsc --strict-clean ratchet (bootstrap-tsc.spec.ts) and the byte-exact
      # fixpoint reproduction (bootstrap-fixpoint-binary.spec.ts) — so this single
      # command is the complete verification.
      - run: bun run check
